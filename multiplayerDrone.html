<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FPV Multiplayer Acro Simulator</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

#hud {
    position: absolute;
    top: 80px;
    left: 10px;
    color: white;
    background: rgba(0,0,0,0.65);
    padding: 14px;
    border-radius: 10px;
    width: 260px;
    z-index: 1500;
}

input[type="range"], input {
    width: 100%;
    margin: 4px 0;
}

button { width: 100%; margin: 5px 0; }

.navbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    background: rgba(0,0,0,0.85);
    color: white;
    z-index: 2000;
}
</style>
</head>

<body>

<div id="hud">
<b>MULTIPLAYER FPV</b><br><br>

<button onclick="hostRoom()">HOST</button>
<input id="roomId" placeholder="ROOM CODE"/>
<button onclick="joinRoom()">JOIN</button>

<div id="status"></div>

<hr>

<label>Pitch</label>
<input id="pitch" type="range" min="0" max="100" value="40">

<label>Roll</label>
<input id="roll" type="range" min="0" max="100" value="30">

<label>Yaw</label>
<input id="yaw" type="range" min="0" max="100" value="40">

<label>Throttle</label>
<input id="throttle" type="range" min="0" max="100" value="50">
</div>

<div class="navbar">
<div>FPV MULTIPLAYER SIM</div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* ---------------- WORLD ---------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(90, innerWidth/innerHeight, 0.1, 20000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,0.5));
const sun = new THREE.DirectionalLight(0xffffff,1);
sun.position.set(200,300,200);
scene.add(sun);

/* ground */
const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(20000,20000),
    new THREE.MeshStandardMaterial({color:0x3fa34d})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ---------------- DRONE ---------------- */
const drone = {
    velocity: new THREE.Vector3(),
    gravity: 0.09,
    drag: 0.99,
    maxSpeed: 30
};

/* ---------------- INPUT ---------------- */
const keys = {};
window.addEventListener("keydown",e=>keys[e.key]=true);
window.addEventListener("keyup",e=>keys[e.key]=false);

/* ---------------- GAMEPAD ---------------- */
let gpIndex = null;
window.addEventListener("gamepadconnected",(e)=>{
    gpIndex = e.gamepad.index;
    document.getElementById("status").innerText = "Controller connected";
});

function getGamepad(){
    if(gpIndex === null) return null;
    return navigator.getGamepads()[gpIndex];
}

function dz(v,d=0.1){ return Math.abs(v)<d ? 0 : v; }
function norm(v){ return v/100; }

/* ---------------- REMOTE DRONE (FIXED SMOOTH FOLLOW) ---------------- */
const remote = new THREE.Mesh(
    new THREE.BoxGeometry(20,10,20),
    new THREE.MeshStandardMaterial({color:0xff0000})
);
scene.add(remote);

const remoteTarget = new THREE.Vector3();

/* ---------------- WEBRTC ---------------- */
let pc;
let channel;
let isHost = false;

const config = {
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
};

/* SIMPLE SIGNALING (websocket relay) */
const socket = new WebSocket("wss://ws.postman-echo.com/raw");

let room = null;
let myId = Math.random().toString(36).slice(2,6).toUpperCase();

function sendSignal(data){
    socket.send(JSON.stringify(data));
}

/* FIX: ignore unrelated messages safely */
socket.onmessage = async (msg)=>{
    let d;
    try { d = JSON.parse(msg.data); } catch { return; }
    if(!room || d.room !== room) return;

    if(d.type === "offer"){
        await pc.setRemoteDescription(d.offer);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        sendSignal({type:"answer", room, answer});
    }

    if(d.type === "answer" && isHost){
        await pc.setRemoteDescription(d.answer);
    }

    if(d.type === "ice"){
        try { await pc.addIceCandidate(d.candidate); } catch {}
    }
};

/* ---------------- HOST ---------------- */
window.hostRoom = async ()=>{
    isHost = true;
    room = myId;

    document.getElementById("status").innerText =
        "ROOM CODE: " + room;

    pc = new RTCPeerConnection(config);
    channel = pc.createDataChannel("fpv");
    setupChannel();

    pc.onicecandidate = (e)=>{
        if(e.candidate){
            sendSignal({type:"ice", room, candidate:e.candidate});
        }
    };

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    sendSignal({type:"offer", room, offer});
};

/* ---------------- JOIN ---------------- */
window.joinRoom = async ()=>{
    room = document.getElementById("roomId").value.toUpperCase();

    pc = new RTCPeerConnection(config);

    pc.ondatachannel = (e)=>{
        channel = e.channel;
        setupChannel();
    };

    pc.onicecandidate = (e)=>{
        if(e.candidate){
            sendSignal({type:"ice", room, candidate:e.candidate});
        }
    };

    sendSignal({type:"join", room});
};

/* ---------------- DATA CHANNEL ---------------- */
function setupChannel(){
    channel.onmessage = (e)=>{
        const d = JSON.parse(e.data);
        if(d.type === "state"){
            remoteTarget.set(d.x,d.y,d.z);
        }
    };
}

/* ---------------- SEND STATE ---------------- */
function sendState(){
    if(!channel || channel.readyState !== "open") return;

    channel.send(JSON.stringify({
        type:"state",
        x:camera.position.x,
        y:camera.position.y,
        z:camera.position.z
    }));
}

/* ---------------- LOOP ---------------- */
function animate(){
requestAnimationFrame(animate);

let pitch=0, roll=0, yaw=0, throttle=0;

const gp = getGamepad();

if(gp){
    pitch = -dz(gp.axes[3]);
    roll = dz(gp.axes[2]);
    yaw = dz(gp.axes[0]);
    throttle = -dz(gp.axes[1]);
}

const k=0.8;
if(keys.w) pitch=k;
if(keys.s) pitch=-k;
if(keys.a) yaw=-k;
if(keys.d) yaw=k;
if(keys.q) roll=-k;
if(keys.e) roll=k;
if(keys[" "]) throttle=1;

const pitchRate = norm(40)*0.05;
const rollRate  = norm(30)*0.05;
const yawRate   = norm(40)*0.05;
const throttlePower = norm(50)*0.5;

/* rotation */
camera.rotateY(-yaw*yawRate);
camera.rotateX(-pitch*pitchRate);
camera.rotateZ(-roll*rollRate);

/* physics */
const up = new THREE.Vector3(0,1,0).applyQuaternion(camera.quaternion);

drone.velocity.addScaledVector(up, throttle*throttlePower);
drone.velocity.y -= drone.gravity;
drone.velocity.multiplyScalar(drone.drag);

if(drone.velocity.length()>drone.maxSpeed){
    drone.velocity.setLength(drone.maxSpeed);
}

const next = camera.position.clone().add(drone.velocity);

if(next.y < 2){
    next.y = 2;
    drone.velocity.y *= -0.3;
}

camera.position.copy(next);

/* FIXED SMOOTH REMOTE FOLLOW */
remote.position.lerp(remoteTarget, 0.25);

/* networking */
sendState();

renderer.render(scene,camera);
}

animate();

/* resize */
window.addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
